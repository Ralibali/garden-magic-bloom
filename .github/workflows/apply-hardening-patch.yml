name: Apply production hardening patch

on:
  push:
    branches: [fix-production-hardening]
    paths: [scripts/apply-production-hardening.mjs]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-production-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/apply-production-hardening.mjs
      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/gardening-coach/index.ts
          git diff --cached --quiet && exit 0
          git commit -m "Enforce Gro quota atomically"
          git push origin HEAD:fix-production-hardening
