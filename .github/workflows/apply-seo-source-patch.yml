name: Apply SEO source patch

on:
  push:
    branches: [seo/dynamic-prerendering]
    paths:
      - 'scripts/apply-seo-source-patch.py'
      - '.github/workflows/apply-seo-source-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/dynamic-prerendering
      - run: python scripts/apply-seo-source-patch.py
      - name: Commit source updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages
          git diff --cached --quiet && exit 0
          git commit -m "Use current year and noindex missing public pages"
          git push origin HEAD:seo/dynamic-prerendering
