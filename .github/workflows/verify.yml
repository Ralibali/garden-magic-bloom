name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Lint source
        run: npm run lint

      - name: Build production app
        run: npm run build

  functions:
    name: Supabase function typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck gardening coach
        run: deno check supabase/functions/gardening-coach/index.ts

  database:
    name: Production migration and pgTAP
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Isolate the production hardening migration
        shell: bash
        run: |
          mkdir -p /tmp/project-migrations
          mv supabase/migrations/*.sql /tmp/project-migrations/
          cp /tmp/project-migrations/20260626173000_production_hardening.sql supabase/migrations/
          cat > supabase/migrations/20260626170000_test_prerequisites.sql <<'SQL'
          create table public.gro_usage (
            user_id uuid not null,
            usage_date date not null default current_date,
            message_count integer not null default 0,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );
          create table public.reminder_settings (
            id uuid primary key default gen_random_uuid(),
            user_id uuid not null unique,
            settings jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );
          create table public.pest_logs (
            id uuid primary key default gen_random_uuid()
          );
          SQL

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Rebuild database from isolated migrations
        run: supabase db reset --local

      - name: Run database tests
        run: supabase test db
