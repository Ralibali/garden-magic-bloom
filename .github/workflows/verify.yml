name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-package-lock
          path: package-lock.json
          retention-days: 1

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Lint source
        id: lint
        continue-on-error: true
        run: npm run lint > lint.log 2>&1

      - name: Upload lint log
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          retention-days: 1

      - name: Build production app
        id: production-build
        continue-on-error: true
        run: npm run build > build.log 2>&1

      - name: Upload build log
        if: steps.production-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
          retention-days: 1

      - name: Report failures
        if: steps.lint.outcome == 'failure' || steps.production-build.outcome == 'failure'
        run: |
          if [ -f lint.log ]; then echo '--- LINT ---'; tail -n 180 lint.log; fi
          if [ -f build.log ]; then echo '--- BUILD ---'; tail -n 180 build.log; fi
          exit 1

  functions:
    name: Supabase function typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck gardening coach
        run: deno check supabase/functions/gardening-coach/index.ts
