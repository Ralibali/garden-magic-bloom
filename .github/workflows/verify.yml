name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production app
        id: production-build
        continue-on-error: true
        run: npm run build > build.log 2>&1

      - name: Upload build log
        if: steps.production-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
          retention-days: 1

      - name: Report build failure
        if: steps.production-build.outcome == 'failure'
        run: |
          tail -n 120 build.log
          exit 1

  functions:
    name: Supabase function typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck gardening coach
        run: deno check supabase/functions/gardening-coach/index.ts
