name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit verified lockfile
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Synchronize npm lockfile"
          git push origin HEAD:${{ github.head_ref }}

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Lint source
        run: npm run lint

      - name: Build production app
        run: npm run build

  functions:
    name: Supabase function typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck gardening coach
        run: deno check supabase/functions/gardening-coach/index.ts
